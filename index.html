<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>签名格式转换器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>签名格式转换器</h1>
      </header>

      <section class="workspace" aria-label="签名编辑器">
        <div class="canvas-area">
          <div class="mode-switch" role="tablist" aria-label="签名输入方式">
            <button class="mode-button active" type="button" data-mode="type" role="tab" aria-selected="true">
              打字
            </button>
            <button class="mode-button" type="button" data-mode="draw" role="tab" aria-selected="false">
              手写
            </button>
          </div>

          <div class="type-panel" id="typePanel">
            <label for="signatureText">签名文字</label>
            <input id="signatureText" type="text" autocomplete="off" value="张三" />
          </div>

          <div class="canvas-controls">
            <div class="tool-switch hidden" id="drawToolSwitch" aria-label="手写工具">
              <button class="tool-button active" type="button" data-tool="write" aria-pressed="true">
                书写
              </button>
              <button class="tool-button" type="button" data-tool="erase" aria-pressed="false">
                擦除
              </button>
            </div>

            <div class="draw-actions hidden" id="drawActions" aria-label="手写操作">
              <button class="icon-button" id="undoButton" type="button" title="撤销" aria-label="撤销" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 14 4 9l5-5" />
                  <path d="M4 9h10a6 6 0 0 1 0 12h-3" />
                </svg>
              </button>
              <button class="icon-button" id="redoButton" type="button" title="重做" aria-label="重做" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m15 14 5-5-5-5" />
                  <path d="M20 9H10a6 6 0 0 0 0 12h3" />
                </svg>
              </button>
              <button class="button secondary fullscreen-button" id="fullscreenButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 3H3v5" />
                  <path d="M16 3h5v5" />
                  <path d="M21 16v5h-5" />
                  <path d="M3 16v5h5" />
                </svg>
                全屏手写
              </button>
              <button class="button primary fullscreen-exit" id="exitFullscreenButton" type="button">
                完成
              </button>
            </div>

            <button class="button secondary clear-button" id="clearButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 7h14" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 7l1-2h4l1 2" />
                <path d="M7 7l1 13h8l1-13" />
              </svg>
              清空
            </button>
          </div>

          <div class="signature-frame" id="signatureFrame">
            <canvas id="signatureCanvas"></canvas>
          </div>
        </div>

        <aside class="settings-panel" aria-label="导出设置">
          <div class="panel-section">
            <h2>画布</h2>
            <div class="field-grid two">
              <label>
                宽度
                <input id="exportWidth" type="number" min="64" max="4096" step="1" value="1600" />
              </label>
              <label>
                高度
                <input id="exportHeight" type="number" min="64" max="4096" step="1" value="900" />
              </label>
            </div>
          </div>

          <div class="panel-section">
            <h2>颜色</h2>
            <div class="color-row">
              <label for="penColor">笔色</label>
              <input id="penColor" type="color" value="#000000" />
            </div>
            <div class="color-row">
              <label for="backgroundColor">背景</label>
              <input id="backgroundColor" type="color" value="#ffffff" />
            </div>
          </div>

          <div class="panel-section">
            <h2>画笔</h2>
            <label class="range-field">
              <span>粗细</span>
              <input id="penWidth" type="range" min="1" max="36" value="6" />
              <output id="penWidthValue">6</output>
            </label>
          </div>

          <div class="panel-section">
            <h2>导出</h2>
            <label>
              格式
              <select id="exportFormat">
                <option value="png">PNG</option>
                <option value="jpeg">JPEG</option>
                <option value="svg">SVG</option>
              </select>
            </label>
            <label class="toggle-row">
              <span>
                <strong>自动裁切空白边缘</strong>
                <small>导出时移除签名周围多余空白</small>
              </span>
              <input id="autoCrop" type="checkbox" checked />
            </label>
            <label class="toggle-row" id="transparentPngRow">
              <span>
                <strong>透明背景 PNG</strong>
                <small>仅 PNG 导出时生效</small>
              </span>
              <input id="transparentPng" type="checkbox" />
            </label>
          </div>

          <div class="action-row">
            <button class="button primary" id="downloadButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v10" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 20h14" />
              </svg>
              下载
            </button>
          </div>
        </aside>
      </section>
    </main>

    <div class="preview-modal hidden" id="previewModal" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="preview-card">
        <div class="preview-header">
          <h2 id="previewTitle">导出预览</h2>
          <button class="icon-button" id="previewCloseButton" type="button" title="关闭" aria-label="关闭预览">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <p class="preview-meta" id="previewMeta"></p>
        <div class="preview-stage" id="previewStage">
          <img id="previewImage" alt="导出前预览" />
        </div>
        <div class="preview-actions">
          <button class="button secondary" id="previewCancelButton" type="button">取消</button>
          <button class="button primary" id="previewDownloadButton" type="button">确认下载</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
